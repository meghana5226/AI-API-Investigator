server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;             # needed for streaming AI chat responses
        # Must stay >= backend's AI_REQUEST_TIMEOUT_SECONDS (see backend/.env),
        # or Nginx will kill slow AI responses (summary/explain/chat) before
        # Ollama finishes generating them -- especially likely on CPU-only
        # inference of a 7B model, which can take several minutes.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: any unmatched route serves index.html so React Router
    # can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
