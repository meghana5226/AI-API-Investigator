# Render Blueprint (Infrastructure as Code) for the backend web service.
# Deploy via: https://dashboard.render.com/blueprints -> New Blueprint Instance
# -> point it at this repo. Render reads this file automatically.
#
# Note: Postgres and Redis are NOT defined here -- this project uses Neon
# (Postgres) and Upstash (Redis) for their more generous, non-expiring free
# tiers. Create those separately and paste their connection strings into the
# environment variables below (see DEPLOYMENT.md for step-by-step).

services:
  - type: web
    name: ai-api-investigator-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: REDIS_URL
        sync: false # paste your Upstash connection string in the Render dashboard
      - key: BACKEND_CORS_ORIGINS
        sync: false # e.g. ["https://your-app.vercel.app"]
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false # paste your free key from https://console.groq.com
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
